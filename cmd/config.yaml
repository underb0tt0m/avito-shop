server_type: "development"           # TODO
port: "8080" # при смене изменить docker-compose.yaml

storage:
  type: "postgres"                 # TODO
  version: "18-alpine"
  connection:
    driver: "postgres"
    host: "localhost" # при запуске в docker-compose необходимо название контейнера БД
    port: "5432"
    database: "avito_shop"
  query_timeout: "1s"

logger:                              # TODO
  type: "zap_logging"
  level: "debug"

tools:
  json: "sonic"

security:
  hash:
    cost: 10
  jwt_token:
    lifetime: "24h"
    prefix: "Bearer"



